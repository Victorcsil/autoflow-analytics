version: "3.8"

services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-automotive
    ports:
      - "3000:3000"
    environment:
      - JAVA_TIMEZONE=America/Sao_Paulo
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase
    volumes:
      - ./metabase-data:/metabase-data
    restart: unless-stopped